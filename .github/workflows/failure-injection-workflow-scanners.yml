name: failure-injection-workflow-scanners
on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  failure-injection-workflow-scanners:
    name: failure-injection-workflow-scanners
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # pinned-from:v4
      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # pinned-from:v5
        with:
          python-version: "3.12"
      - name: Run scanner failure-injection harness
        run: |
          python .ci/portable/run_failure_injection_checks.py \
            --output failure_injection_workflow_scanners.json
      - name: Upload harness artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # pinned-from:v4
        with:
          name: failure-injection-workflow-scanners
          path: failure_injection_workflow_scanners.json
          retention-days: 30
