name: dev-env-provisioner-unlock-audit
on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dev-env-provisioner-unlock-audit:
    name: dev-env-provisioner-unlock-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for git status)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # pinned-from:v4
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # pinned-from:v5
        with:
          python-version: "3.12"
      - name: Run repo unlock audit
        run: |
          python .ci/portable/run_repo_unlock_audit.py \
            --repo . \
            --output-json repo_unlock_audit.json \
            --output-md repo_unlock_audit.md
      - name: Upload unlock audit artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # pinned-from:v4
        with:
          name: repo-unlock-audit
          path: |
            repo_unlock_audit.json
            repo_unlock_audit.md
          retention-days: 30
