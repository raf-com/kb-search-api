name: stale
on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark and close stale PRs / issues
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 60
          days-before-close: 30
          stale-pr-message: |
            This PR has had no activity for 60 days. It will be closed in 30
            days unless there's a comment, push, or `no-stale` label.
          close-pr-message: |
            Closing as stale (90 days no activity). Reopen if needed.
          stale-issue-message: |
            This issue has had no activity for 60 days. It will be closed in
            30 days unless there's a comment or `no-stale` label.
          close-issue-message: |
            Closing as stale (90 days no activity). Reopen if needed.
          stale-pr-label: stale
          stale-issue-label: stale
          exempt-pr-labels: "no-stale,pinned,security"
          exempt-issue-labels: "no-stale,pinned,security"
          operations-per-run: 30
