version: 2
updates:
  # GitHub Actions: the 5 portable gate workflows + lint/test/build pin
  # actions by SHA. Dependabot surfaces SHA bumps as PRs.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"

  # Python deps via requirements.txt.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      # Group test/lint tooling so dev-only bumps land as a single PR.
      dev-tooling:
        patterns:
          - "pytest*"
          - "ruff"
          - "mypy"
          - "black"
          - "coverage"
          - "pre-commit"
      fastapi-stack:
        patterns:
          - "fastapi"
          - "uvicorn*"
          - "pydantic*"
          - "starlette"
      sqlalchemy-stack:
        patterns:
          - "sqlalchemy*"
          - "alembic"
          - "psycopg*"
          - "asyncpg"

  # Docker base image. Update Dockerfile FROM lines.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "build"
      include: "scope"
