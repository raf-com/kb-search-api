version: '3.9'

services:
  # =========================================================================
  # PostgreSQL (Source of Truth)
  # =========================================================================
  postgresql:
    image: postgres:15-alpine
    container_name: kb_postgresql
    environment:
      POSTGRES_DB: kb_db
      POSTGRES_USER: kb_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-your-secure-password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgresql_data:/var/lib/postgresql/data
      - ./init-scripts/kb-schema.sql:/docker-entrypoint-initdb.d/01-kb-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kb_user -d kb_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - kb_network

  # =========================================================================
  # Meilisearch (Full-Text Search)
  # =========================================================================
  meilisearch:
    image: getmeili/meilisearch:v1.7.0
    container_name: kb_meilisearch
    environment:
      MEILI_ENV: production
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-your-32-char-secret-key-minimum}
      MEILI_ANALYTICS: "false"
      MEILI_MAX_INDEXING_MEMORY: 4gb
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "7700:7700"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - kb_network

  # =========================================================================
  # Qdrant (Vector Search)
  # =========================================================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: kb_qdrant
    environment:
      QDRANT_API_KEY: ${QDRANT_API_KEY:-your-qdrant-api-key}
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - kb_network

  # =========================================================================
  # Redis (Caching)
  # =========================================================================
  redis:
    image: redis:7-alpine
    container_name: kb_redis
    command: redis-server --maxmemory 1gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - kb_network

  # =========================================================================
  # FastAPI Search Service
  # =========================================================================
  search-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kb_search_api
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql://kb_user:${DB_PASSWORD:-your-secure-password}@postgresql:5432/kb_db
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_KEY: ${MEILI_MASTER_KEY:-your-32-char-secret-key-minimum}
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-your-qdrant-api-key}
      REDIS_URL: redis://redis:6379/0
      LITELLM_API_KEY: ${LITELLM_API_KEY:-sk-your-openai-api-key}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      API_WORKERS: ${API_WORKERS:-4}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      DEFAULT_SEARCH_LIMIT: ${DEFAULT_SEARCH_LIMIT:-10}
      MAX_SEARCH_LIMIT: ${MAX_SEARCH_LIMIT:-100}
      DEFAULT_SEMANTIC_WEIGHT: ${DEFAULT_SEMANTIC_WEIGHT:-0.5}
    ports:
      - "8000:8000"
    depends_on:
      postgresql:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - kb_network

# ============================================================================
# Volumes
# ============================================================================
volumes:
  postgresql_data:
    driver: local
  meilisearch_data:
    driver: local
  qdrant_data:
    driver: local
  redis_data:
    driver: local

# ============================================================================
# Networks
# ============================================================================
networks:
  kb_network:
    driver: bridge
